# Release build check.
# Baton is not published to PyPI yet; this workflow intentionally builds the
# package on release/manual dispatch without uploading it.

name: Release Build Check

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set published version
        run: |
          [[ "${GITHUB_REF_NAME}" = v*\.*\.* ]] || (echo 'Expected v1.2.3 style GITHUB_REF_NAME' >&2; exit 1)

          version="${GITHUB_REF_NAME}"
          version="${version#v}"

          # tomlq is not available on GHA, so we do what we must
          sed 's~^version = "0.0.0"\s*$~version = "'"${version}"'"~' < pyproject.toml > pyproject.toml.updated
          mv -vf pyproject.toml.updated pyproject.toml

      - run: pip install build
      - run: python -m build
